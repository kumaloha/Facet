# Anchor 信息源总表
# ═════════════════════════════════════════════════════════════════════════════
# 三大类：
#   primary_sources  — 一手信息源（政府/央行/交易所/SEC/学术原文等权威原始数据）
#   authors          — 第三方分析人物（KOL/经济学家/基金经理，按 tier 分级）
#   channels         — 第三方分析机构频道（智库/国际组织 RSS 等，无特定作者）
#
# 字段说明：
#   tier: 1 = 顶级权威（手握货币权/行政权/AUM>1000亿）, 2 = 行业专家
#   accessible: true = 系统可自动抓取, false = 需人工获取或付费墙
#   domain: 政策 | 产业 | 公司 | 期货 | 技术（一手源的内容领域）
#   frequency: daily | weekly | monthly | quarterly | yearly（发布频率）
# ═════════════════════════════════════════════════════════════════════════════


# =============================================================================
# PRIMARY SOURCES — 一手信息源（content_nature = 一手信息）
# =============================================================================

primary_sources:

  # ── 政策 · 一手信息 ─────────────────────────────────────────────────────────

  - name: 美联储 FOMC 声明与会议纪要
    domain: 政策
    institution: Federal Reserve
    frequency: 6w
    sources:
      - url: https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm
        accessible: true
        note: FOMC 会议日历，含声明、纪要、经济预测

  - name: 美联储国会证词
    domain: 政策
    institution: Federal Reserve
    frequency: quarterly
    sources:
      - url: https://www.federalreserve.gov/newsevents/testimony.htm
        accessible: true

  - name: ECB 利率决议与声明
    domain: 政策
    institution: European Central Bank
    frequency: 6w
    sources:
      - url: https://www.ecb.europa.eu/press/govcdec/mopo/html/index.en.html
        accessible: true

  - name: 日本银行金融政策决定
    domain: 政策
    institution: Bank of Japan
    frequency: monthly
    sources:
      - url: https://www.boj.or.jp/en/mopo/mpmdeci/index.htm
        accessible: true

  - name: 中国人民银行货币政策
    domain: 政策
    institution: 中国人民银行
    frequency: quarterly
    sources:
      - url: http://www.pbc.gov.cn/zhengcehuobisi/125207/125213/125431/index.html
        accessible: true
        note: 货币政策执行报告（季度）

  - name: 中国政府工作报告
    domain: 政策
    institution: 国务院
    frequency: yearly
    sources:
      - url: https://npcobserver.com/legislation/government-work-reports/
        accessible: true
        note: NPC Observer 英文翻译版，年度发布

  - name: 美国联邦预算案
    domain: 政策
    institution: OMB / White House
    frequency: yearly
    sources:
      - url: https://www.govinfo.gov/app/collection/budget
        accessible: true

  - name: 美国行政令
    domain: 政策
    institution: White House
    frequency: weekly
    sources:
      - url: https://www.whitehouse.gov/presidential-actions/
        accessible: true
        crawl_depth: 1

  # ── 期货/宏观 · 一手信息 ───────────────────────────────────────────────────

  - name: EIA 短期能源展望 (STEO)
    domain: 期货
    institution: U.S. Energy Information Administration
    frequency: monthly
    sources:
      - url: https://www.eia.gov/outlooks/steo/
        accessible: true

  - name: BLS 就业形势报告（非农）
    domain: 期货
    institution: Bureau of Labor Statistics
    frequency: monthly
    sources:
      - url: https://www.bls.gov/news.release/empsit.nr0.htm
        accessible: true

  - name: BLS CPI 报告
    domain: 期货
    institution: Bureau of Labor Statistics
    frequency: monthly
    sources:
      - url: https://www.bls.gov/news.release/cpi.nr0.htm
        accessible: true

  - name: ISM 制造业 PMI
    domain: 期货
    institution: Institute for Supply Management
    frequency: monthly
    sources:
      - url: https://www.ismworld.org/supply-management-news-and-reports/reports/ism-report-on-business/
        accessible: true

  - name: CFTC COT 报告
    domain: 期货
    institution: Commodity Futures Trading Commission
    frequency: weekly
    sources:
      - url: https://www.cftc.gov/dea/futures/deacmelf.htm
        accessible: true

  - name: 中国 NBS 月度经济数据
    domain: 期货
    institution: 国家统计局
    frequency: monthly
    sources:
      - url: https://www.stats.gov.cn/english/PressRelease/
        accessible: true

  # ── 公司 · 一手信息（SEC 财报）─────────────────────────────────────────────

  - name: SEC EDGAR Full-Text Search
    domain: 公司
    institution: U.S. Securities and Exchange Commission
    frequency: daily
    sources:
      - url: https://efts.sec.gov/LATEST/search-index?q=%2210-K%22&dateRange=custom&startdt=2026-01-01
        accessible: true
        note: 可通过 EDGAR API 按公司/类型检索 10-K/10-Q/8-K

  # ── 技术 · 一手信息（学术论文）─────────────────────────────────────────────

  - name: arXiv cs.AI 最新论文
    domain: 技术
    institution: arXiv (Cornell University)
    frequency: daily
    sources:
      - platform: RSS
        url: https://rss.arxiv.org/rss/cs.AI
        accessible: true

  - name: arXiv cs.CL (NLP) 最新论文
    domain: 技术
    institution: arXiv (Cornell University)
    frequency: daily
    sources:
      - platform: RSS
        url: https://rss.arxiv.org/rss/cs.CL
        accessible: true

  # ── 产业 · 一手信息 ─────────────────────────────────────────────────────────

  - name: Gartner 行业报告（公开摘要）
    domain: 产业
    institution: Gartner
    frequency: quarterly
    sources:
      - url: https://www.gartner.com/en/articles
        accessible: true
        note: 完整报告付费，公开摘要可抓取

  - name: SEMI 全球半导体设备出货统计
    domain: 产业
    institution: SEMI
    frequency: quarterly
    sources:
      - url: https://www.semi.org/en/news-media-press
        accessible: true



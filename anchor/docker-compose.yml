services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anchor
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: anchor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  anchor:
    build: .
    env_file: .env
    depends_on:
      - db
    ports:
      - "8765:8765"
    volumes:
      - ./sources.yaml:/app/sources.yaml:ro

volumes:
  pgdata:

services:
  # Axion 自有数据库
  axion-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: axion
      POSTGRES_USER: axion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axion_dev}
    ports:
      - "5432:5432"
    volumes:
      - axion_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axion"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Anchor 只读数据库（如果 Anchor 也用 PostgreSQL）
  anchor-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: anchor
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: ${ANCHOR_POSTGRES_PASSWORD:-anchor_dev}
    ports:
      - "5433:5432"
    volumes:
      - anchor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anchor"]
      interval: 5s
      timeout: 3s
      retries: 5

  axion:
    build: .
    depends_on:
      axion-db:
        condition: service_healthy
      anchor-db:
        condition: service_healthy
    environment:
      AXION_DB_URL: postgresql://axion:${POSTGRES_PASSWORD:-axion_dev}@axion-db:5432/axion
      ANCHOR_DB_URL: postgresql://anchor:${ANCHOR_POSTGRES_PASSWORD:-anchor_dev}@anchor-db:5432/anchor
      FRED_API_KEY: ${FRED_API_KEY:-}
      ENV: aliyun
    volumes:
      - ./data:/app/data

volumes:
  axion_pgdata:
  anchor_pgdata:
